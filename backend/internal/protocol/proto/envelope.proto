syntax = "proto3";

package nexus.protocol;

option go_package = "github.com/awatansh/nexus/internal/protocol/proto";

enum MessageType {
UNKNOWN = 0;

HELLO = 1;
HELLO_ACK = 2;

PING = 3;
PONG = 4;

PEER_LIST = 5;

CHAT = 6;

SEARCH_REQUEST = 7;
SEARCH_RESPONSE = 8;

FILE_ANNOUNCE = 9;

FILE_REQUEST = 10;
FILE_CHUNK = 11;
FILE_COMPLETE = 12;
}

message Envelope {
string message_id = 1;

string sender_peer_id = 2;

int64 timestamp_ms = 3;

MessageType type = 4;

uint32 protocol_version = 5;

bytes payload = 6;

bytes signature = 7;
}
